<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Land Regeneration — Coming Soon | Steady Eco</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#0a0f0a">
  <meta name="description" content="Steady Eco Land Regeneration — large-scale ecological restoration for Far North Queensland. Coming soon.">
  <meta name="robots" content="noindex">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0f0a;
      --green: #4a9e3f;
      --gold: #c8a84b;
      --text: #e8ede6;
      --muted: #7a8f76;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
      -webkit-font-smoothing: antialiased;
    }

    .back {
      position: absolute;
      top: 28px;
      left: 28px;
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.05em;
      transition: color 0.3s;
    }
    .back:hover { color: var(--text); }

    .label {
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 32px;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(36px, 7vw, 64px);
      letter-spacing: 0.08em;
      color: var(--text);
      margin-bottom: 20px;
    }

    .sub {
      font-size: clamp(14px, 2.5vw, 18px);
      color: var(--muted);
      max-width: 480px;
      line-height: 1.7;
      margin-bottom: 48px;
    }

    /* Animated pulse line */
    .pulse-line {
      width: 120px;
      height: 2px;
      background: var(--bg);
      position: relative;
      overflow: hidden;
      margin: 0 auto 56px;
      border-radius: 1px;
    }
    .pulse-line::after {
      content: '';
      position: absolute;
      top: 0;
      left: -40%;
      width: 40%;
      height: 100%;
      background: linear-gradient(90deg, transparent, var(--green), transparent);
      animation: pulse-sweep 2.5s ease-in-out infinite;
    }
    @keyframes pulse-sweep {
      0% { left: -40%; }
      100% { left: 100%; }
    }

    /* Form */
    .form-wrap {
      max-width: 400px;
      width: 100%;
    }
    .form-title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-size: 20px;
      color: var(--gold);
      margin-bottom: 24px;
      letter-spacing: 0.04em;
    }
    .field {
      width: 100%;
      margin-bottom: 14px;
    }
    .field input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(74,158,63,0.06);
      border: 1px solid rgba(74,158,63,0.15);
      border-radius: 4px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      outline: none;
      transition: border-color 0.3s;
    }
    .field input::placeholder { color: var(--muted); }
    .field input:focus { border-color: var(--green); }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: transparent;
      border: 1px solid rgba(74,158,63,0.3);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 8px;
      border-radius: 4px;
    }
    .submit-btn:hover {
      background: var(--green);
      border-color: var(--green);
      color: var(--bg);
    }

    .success {
      display: none;
      color: var(--green);
      font-size: 14px;
      margin-top: 16px;
      line-height: 1.6;
    }

    .footer-note {
      position: absolute;
      bottom: 24px;
      font-size: 11px;
      color: rgba(122,143,118,0.4);
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <a href="/" class="back">← Steady Eco</a>

  <div class="label">Coming Soon</div>
  <h1>Land Regeneration</h1>
  <p class="sub">Something significant is being prepared for Far North Queensland.</p>

  <div class="pulse-line"></div>

  <div class="form-wrap">
    <div class="form-title">Register Your Interest</div>
    <form id="interest-form" onsubmit="return submitInterest(event)">
      <div class="field">
        <input type="text" name="name" placeholder="Your name" required>
      </div>
      <div class="field">
        <input type="email" name="email" placeholder="Email address" required>
      </div>
      <div class="field">
        <input type="text" name="org" placeholder="Organisation (optional)">
      </div>
      <button type="submit" class="submit-btn">Register Interest</button>
    </form>
    <div class="success" id="success-msg">
      Thank you. We'll be in touch when Land Regeneration launches.
    </div>
  </div>

  <div class="footer-note">steadyeco.com</div>

  <script>
    function submitInterest(e) {
      e.preventDefault();
      const form = e.target;
      const data = {
        name: form.name.value,
        email: form.email.value,
        org: form.org.value,
        date: new Date().toISOString()
      };

      // Save to localStorage
      const existing = JSON.parse(localStorage.getItem('se_regen_interest') || '[]');
      existing.push(data);
      localStorage.setItem('se_regen_interest', JSON.stringify(existing));

      // Send via Formspree (same endpoint as contact form)
      fetch('https://formspree.io/f/xvzwlpko', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          _subject: 'Land Regeneration Interest — ' + data.name,
          name: data.name,
          email: data.email,
          organisation: data.org || 'Not provided',
          message: 'This person registered interest in the Land Regeneration service.',
          _replyto: data.email
        })
      }).catch(() => {}); // Silent fail — localStorage is the backup

      // Show success
      form.style.display = 'none';
      document.getElementById('success-msg').style.display = 'block';
      return false;
    }
  </script>
</body>
</html>
