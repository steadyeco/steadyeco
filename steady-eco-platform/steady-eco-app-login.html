<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Steady Eco — Sign In Required</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0f0a; color: #e8ede6;
      font-family: 'DM Sans', system-ui, sans-serif;
      min-height: 100vh; display: flex;
      flex-direction: column; align-items: center;
      justify-content: center; padding: 24px;
    }
    h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 28px; font-weight: 300; margin-bottom: 8px;
    }
    p { font-size: 14px; color: #7a8f76; margin-bottom: 32px; }
    a {
      display: inline-block; padding: 12px 32px;
      background: #4a9e3f; color: #fff; text-decoration: none;
      border-radius: 8px; font-size: 14px; font-weight: 500;
      transition: background 0.2s;
    }
    a:hover { background: #5db552; }
    .footer { margin-top: 48px; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(122,143,118,0.5); }
  </style>
</head>
<body>
  <h1>Sign In Required</h1>
  <p>You need to sign in to access the platform.</p>
  <a href="http://localhost:3000/login?role=operations" id="login-link">Sign In</a>
  <div class="footer">Steady Eco — Eco Operations Platform</div>
  <script>
    // In production, redirect to the same domain
    if (window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
      document.getElementById('login-link').href = '/login?role=operations'
    }
  </script>
</body>
</html>
