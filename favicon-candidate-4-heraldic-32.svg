<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- 32x32 optimized — shield + bird + casque, essential forms -->

  <!-- Dark background -->
  <rect width="32" height="32" rx="5" fill="#0a0f0a"/>

  <!-- SHIELD outline -->
  <path d="
    M 16,3
    L 6,3
    C 5,3 4,4 4,5
    L 4,17
    C 4,22 8,26 16,29
    C 24,26 28,22 28,17
    L 28,5
    C 28,4 27,3 26,3
    Z"
    fill="none" stroke="#c8a84b" stroke-width="1"/>

  <!-- CASQUE — solid gold, the only fill -->
  <path d="M 15,10 L 13.5,7 C 13,5.5 14,4 15.5,3.5
           L 17,3.5 C 18,4 18.5,5 18,6.5 L 17.5,9 Z"
        fill="#c8a84b"/>

  <!-- Head -->
  <circle cx="16" cy="11" r="2.5"
          fill="none" stroke="#4a9e3f" stroke-width="1.5"/>

  <!-- Neck -->
  <line x1="16" y1="13.5" x2="16" y2="16"
        stroke="#4a9e3f" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Body — simplified oval -->
  <ellipse cx="16" cy="20" rx="5" ry="4"
           fill="none" stroke="#4a9e3f" stroke-width="1.5"/>

  <!-- Legs simplified -->
  <line x1="14" y1="24" x2="13" y2="27"
        stroke="#4a9e3f" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="18" y1="24" x2="19" y2="27"
        stroke="#4a9e3f" stroke-width="1.5" stroke-linecap="round"/>

</svg>